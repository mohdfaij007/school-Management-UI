<div class="login-container">
<div class="left-panel">
  <img src="/../../Angular/school-admin-ui/src/assets/images/7840135.jpg" alt="logo" class="illustration-img">
  <div class="card">
    <div class="card-header">
      <h3>School Management System</h3>
      <p>Please login to continue</p>
    </div>
    
    <div class="card-body">
      <!-- FIX: Renamed #form to #loginForm to avoid conflict with component property 'form' -->
      <!-- FIX: Changed f.submitted to loginForm.submitted -->
      <form *ngIf="!isLoggedIn" (ngSubmit)="loginForm.form.valid && onSubmit()" #loginForm="ngForm" novalidate>
        
        <!-- Username Field -->
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            class="form-control"
            name="username"
            [(ngModel)]="form.username"
            required
            #username="ngModel"
            placeholder="Enter your username"
          />
          <div class="error-text" *ngIf="username.errors && loginForm.submitted">
            Username is required!
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            class="form-control"
            name="password"
            [(ngModel)]="form.password"
            required
            minlength="4"
            #password="ngModel"
            placeholder="Enter your password"
          />
          <div class="error-text" *ngIf="password.errors && loginForm.submitted">
            Password is required!
          </div>
        </div>

        <!-- Submit Button -->
        <div class="form-group">
          <button class="btn-primary">Login</button>
        </div>

        <!-- Error Message -->
        <div class="alert alert-danger" *ngIf="isLoginFailed">
          Login failed: {{ errorMessage }}
        </div>
      </form>

      <div class="alert alert-success" *ngIf="isLoggedIn">
        Logged in successfully! Redirecting...
      </div>
    </div>
  </div>
</div>
<div class="right-panel">

  <h1>Exam Mastery Hub</h1>
    <p>Unlocking Your Potential with Mastery Hub's Exam Excellence Platform</p>
</div>
</div>
