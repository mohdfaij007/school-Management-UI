<div class="admission-wrapper">
  
  <div class="header-card">
    <h2>New Admission Form</h2>
    <p>Session 2024-2025</p>
  </div>

  <div class="stepper-container">
    <div class="step" [class.active]="currentStep >= 1">1. Student</div>
    <div class="line"></div>
    <div class="step" [class.active]="currentStep >= 2">2. Family</div>
    <div class="line"></div>
    <div class="step" [class.active]="currentStep >= 3">3. Contact</div>
    <div class="line"></div>
    <div class="step" [class.active]="currentStep >= 4">4. Docs</div>
  </div>

  <form [formGroup]="admissionForm" (ngSubmit)="onSubmit()" class="main-form">

    <div *ngIf="currentStep === 1" formGroupName="studentDetails" class="form-section fade-in">
      <h3>Student Details</h3>
      <div class="form-grid">
        <div class="field-group">
          <label>First Name <span class="req">*</span></label>
          <input formControlName="firstName" type="text" placeholder="e.g Arun">
        </div>
        <div class="field-group">
          <label>Last Name <span class="req" aria-placeholder="e.g Sharma">*</span></label>
          <input formControlName="lastName" type="text">
        </div>
        <div class="field-group">
          <label>Date of Birth <span class="req">*</span></label>
          <input formControlName="dob" type="date">
        </div>
        <div class="field-group">
          <label>Class Applying For <span class="req">*</span></label>
          <select formControlName="admissionClass">
            <option *ngFor="let c of classes" [value]="c">{{c}}</option>
          </select>
        </div>
        <div class="field-group">
          <label>Aadhar No (12 Digit)</label>
          <input formControlName="aadharNo" type="text" maxlength="12">
        </div>
        <div class="field-group">
          <label>Category</label>
          <select formControlName="category">
            <option *ngFor="let cat of categories" [value]="cat">{{cat}}</option>
          </select>
        </div>
      </div>
    </div>

    <div *ngIf="currentStep === 2" class="form-section fade-in">
      
      <div formGroupName="parentDetails">
        <h3>Parent Details</h3>
        <div class="form-grid">
          <div class="field-group">
            <label>Father's Name <span class="req">*</span></label>
            <input formControlName="fatherName" type="text">
          </div>
          <div class="field-group">
            <label>Father's Mobile <span class="req">*</span></label>
            <input formControlName="fatherMobile" type="tel">
          </div>
          <div class="field-group">
            <label>Mother's Name <span class="req">*</span></label>
            <input formControlName="motherName" type="text">
          </div>
          <div class="field-group">
            <label>Annual Income (For RTE)</label>
            <input formControlName="annualIncome" type="number">
          </div>
        </div>
      </div>

      <hr>

      <div class="sibling-section">
        <div class="flex-header">
          <h3>Sibling Details (For Fee Discount)</h3>
          <button type="button" class="btn-add" (click)="addSibling()">+ Add Sibling</button>
        </div>

        <div formArrayName="siblings">
          <div *ngFor="let sibling of siblings.controls; let i=index" [formGroupName]="i" class="sibling-row">
            
            <div class="field-group">
              <input formControlName="name" placeholder="Sibling Name">
            </div>
            <div class="field-group">
              <select formControlName="class">
                <option value="">Select Class</option>
                <option *ngFor="let c of classes" [value]="c">{{c}}</option>
              </select>
            </div>
            <div class="field-group">
              <input formControlName="admissionNo" placeholder="Adm No (if existing)">
            </div>
            
            <button type="button" class="btn-remove" (click)="removeSibling(i)">X</button>
          </div>
          
          <p *ngIf="siblings.length === 0" class="no-data-text">No siblings added.</p>
        </div>
      </div>

    </div>

    <div *ngIf="currentStep === 3" formGroupName="contact" class="form-section fade-in">
      <h3>Address & Transport</h3>
      <div class="field-group full-width" style="margin-bottom: 15px;">
        <label>Current Address</label>
        <textarea formControlName="currentAddress" rows="3"></textarea>
      </div>
      <div class="form-grid">
        <div class="field-group">
          <label>City</label>
          <input formControlName="city" type="text">
        </div>
        <div class="field-group">
          <label>Pincode</label>
          <input formControlName="pincode" type="text">
        </div>
      </div>
      
      <div class="checkbox-row">
        <input type="checkbox" formControlName="isPermanentSame" id="perm">
        <label for="perm">Permanent Address same as Current</label>
      </div>

      <div class="transport-box">
        <div class="checkbox-row">
          <input type="checkbox" formControlName="transportRequired" id="trans">
          <label for="trans"><strong>Transport Required?</strong></label>
        </div>
        <div class="field" *ngIf="admissionForm.get('contact.transportRequired')?.value">
          <label>Select Bus Route</label>
          <select formControlName="pickupPoint">
            <option *ngFor="let r of transportRoutes" [value]="r">{{r}}</option>
          </select>
        </div>
      </div>
    </div>

    <div *ngIf="currentStep === 4" formGroupName="academic" class="form-step">
      <h3>Documents</h3>
      <div class="grid-2">
        <div class="field">
          <label>Previous School</label>
          <input formControlName="previousSchool" type="text">
        </div>
        <div class="field">
          <label>Transfer Certificate No</label>
          <input formControlName="tcNumber" type="text">
        </div>
      </div>
      
      <div class="upload-grid">
        <div class="upload-card">
          <label>Student Photo</label>
          <input type="file">
        </div>
        <div class="upload-card">
          <label>Birth Certificate</label>
          <input type="file">
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-sec" (click)="prevStep()" [disabled]="currentStep === 1">Back</button>
      <button type="button" class="btn-pri" (click)="nextStep()" *ngIf="currentStep < 4">Next Step</button>
      <button type="submit" class="btn-success" *ngIf="currentStep === 4">Submit Application</button>
    </div>

  </form>
</div>
