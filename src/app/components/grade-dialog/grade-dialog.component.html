<h2 mat-dialog-title>Add Grading Rule</h2>

<mat-dialog-content>
  <form [formGroup]="gradeForm" class="dialog-form">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Grade Name (e.g., A1, B2)</mat-label>
      <input matInput formControlName="gradeName">
      <mat-error *ngIf="gradeForm.get('gradeName')?.hasError('required')">Grade Name is required</mat-error>
    </mat-form-field>

    <div class="row-group">
      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Min %</mat-label>
        <input matInput type="number" formControlName="minPercentage">
        <mat-error *ngIf="gradeForm.get('minPercentage')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="gradeForm.get('minPercentage')?.hasError('invalidRange')">Must be < Max</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Max %</mat-label>
        <input matInput type="number" formControlName="maxPercentage">
        <mat-error *ngIf="gradeForm.get('maxPercentage')?.hasError('required')">Required</mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Grade Point (For CGPA)</mat-label>
      <input matInput type="number" formControlName="gradePoint" placeholder="e.g., 10.0">
      <mat-error *ngIf="gradeForm.get('gradePoint')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Remarks (Optional)</mat-label>
      <input matInput formControlName="remarks" placeholder="e.g., Outstanding">
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="gradeForm.invalid">
    Save Grade
  </button>
</mat-dialog-actions>
