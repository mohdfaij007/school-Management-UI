<header *ngIf="isLoggedIn">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  
  <nav class="navbar">
    <div class="navbar-left">
      <button class="menu-btn" (click)="toggleSidebar()">
        <i class="material-icons">menu</i>
      </button>
      <div class="brand-container">
        <h2>School Manager</h2>
      </div>
    </div>
    
    <div class="user-info" *ngIf="currentUser">
      <div class="user-avatar">
        <i class="material-icons">account_circle</i>
        <span>{{ username }}</span>
      </div>
      <button class="btn-logout" (click)="logout()">
        <i class="material-icons logout-icon">logout</i>
        <span>Logout</span>
      </button>
    </div>
  </nav>

  <div class="main-body">
    <aside class="sidebar" [class.closed]="!isSidebarOpen">
      <div class="sidebar-content">
        <div *ngFor="let item of menuItems" class="menu-group">
          
          <div class="menu-header" 
               (click)="toggleMenu(item)"
               [class.active]="expandedItem === item || (!item.children && item.route === router.url)">
            
            <div class="label-container" [routerLink]="item.children ? null : item.route">
              <i class="material-icons menu-icon" *ngIf="item.icon">{{ item.icon }}</i>
              <span class="menu-text">{{ item.label }}</span>
            </div>
            
            <i class="material-icons arrow-icon" 
               [class.rotated]="expandedItem === item" 
               *ngIf="item.children && item.children.length">
               expand_more
            </i>
          </div>

          <ul class="submenu" *ngIf="expandedItem === item">
            <li *ngFor="let child of item.children" class="submenu-item">
              <a [routerLink]="child.route" routerLinkActive="active-sublink">{{ child.label }}</a>
            </li>
          </ul>

        </div>
      </div>
    </aside>
  </div>
</header>
