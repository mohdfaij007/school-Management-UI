<div class="report-container">
  <div class="header">
    <h2>Daily Attendance Report</h2>
    <a routerLink="/dashboard" class="btn-back">Back to Dashboard</a>
  </div>

  <div class="controls">
    <div class="date-group">
      <label for="reportDate">Select Date:</label>
      <input 
        type="date" 
        id="reportDate" 
        class="form-control" 
        [(ngModel)]="selectedDate" 
        (change)="fetchAttendance()" 
      />
    </div>
    <button class="btn-refresh" (click)="fetchAttendance()">Refresh</button>
  </div>

  <div *ngIf="isLoading" class="status-msg">Loading attendance data...</div>
  <div *ngIf="message && !isLoading && attendanceRecords.length === 0" class="status-msg warning">{{ message }}</div>

  <table class="report-table" *ngIf="attendanceRecords.length > 0">
    <thead>
      <tr>
        <th>Student Name</th>
        <th>Admission No</th>
        <th>Status</th>
        <th>Remarks</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let record of attendanceRecords">
        <td>{{ record.student.firstName }} {{ record.student.lastName }}</td>
        <td>{{ record.student.admissionNumber }}</td>
        <td>
          <span class="badge" [ngClass]="{
            'present': record.status === 'PRESENT',
            'absent': record.status === 'ABSENT',
            'late': record.status === 'LATE'
          }">
            {{ record.status }}
          </span>
        </td>
        <td>{{ record.remarks || '-' }}</td>
      </tr>
    </tbody>
  </table>
</div>
