<div class="page-container">
  
  <mat-card class="form-card">
    
    <div class="card-header-custom">
      <h2>{{ isEditMode ? 'Edit Fee Head' : 'Add New Fee Head' }}</h2>
      <p>Define the fee type and its payment frequency.</p>
    </div>

    <form [formGroup]="feeHeadForm" (ngSubmit)="onSubmit()">
      
      <div class="form-content">
        
        <div class="row">
          
          <div class="col-md-6">
            <mat-form-field appearance="outline">
              <mat-label>Fee Name</mat-label>
              <input matInput formControlName="headName" placeholder="e.g. Tuition Fee">
              <mat-icon matSuffix>edit</mat-icon>
              <mat-error *ngIf="feeHeadForm.get('headName')?.hasError('required')">
                Fee Name is required
              </mat-error>
            </mat-form-field>
          </div>

          <div class="col-md-6">
            <mat-form-field appearance="outline">
              <mat-label>Frequency</mat-label>
              <mat-select formControlName="frequency">
                <mat-option *ngFor="let freq of frequencies" [value]="freq">
                  {{ freq }}
                </mat-option>
              </mat-select>
              <mat-icon matSuffix>event</mat-icon>
              <mat-error *ngIf="feeHeadForm.get('frequency')?.hasError('required')">
                Frequency is required
              </mat-error>
            </mat-form-field>
          </div>

        </div>

        <div class="row mt-2">
          <div class="col-12">
            <mat-form-field appearance="outline">
              <mat-label>Description (Optional)</mat-label>
              <textarea matInput formControlName="description" rows="3" placeholder="Enter details about this fee..."></textarea>
            </mat-form-field>
          </div>
        </div>

      </div>

      <div class="form-actions">
        
        <button mat-button type="button" routerLink="/fees/head" color="warn">
          Cancel
        </button>

        <div class="d-flex align-items-center gap-3">
          <mat-checkbox *ngIf="!isEditMode" [(ngModel)]="createAnother" [ngModelOptions]="{standalone: true}" color="primary">
            Create another one    
          </mat-checkbox>
          <button mat-raised-button color="primary" type="submit" [disabled]="feeHeadForm.invalid">
            <mat-icon>save</mat-icon> {{ isEditMode ? 'Update Fee' : 'Save Fee' }}
          </button>
        </div>

      </div>

    </form>
  </mat-card>

</div>
