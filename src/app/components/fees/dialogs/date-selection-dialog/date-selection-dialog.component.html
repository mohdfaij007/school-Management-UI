<h2 mat-dialog-title>Activate {{ data.feeHeadName }}</h2>

<mat-dialog-content>
  <p>Select the active duration for this fee.</p>

  <mat-form-field appearance="outline" style="width: 100%;">
    <mat-label>Start Date</mat-label>
    <input matInput [matDatepicker]="picker1" [(ngModel)]="startDate">
    <mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
    <mat-datepicker #picker1></mat-datepicker>
  </mat-form-field>

  <mat-form-field appearance="outline" style="width: 100%; margin-top: 10px;">
    <mat-label>End Date (Optional)</mat-label>
    <input matInput [matDatepicker]="picker2" [(ngModel)]="endDate" placeholder="Leave empty for full session">
    <mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
    <mat-datepicker #picker2></mat-datepicker>
    <mat-hint>If empty, fee applies until session ends.</mat-hint>
  </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onConfirm()">Confirm & Activate</button>
</mat-dialog-actions>
