<div class="container-fluid p-4" style="background-color: #f0f2f5; min-height: 90vh;">
  
  <div class="header-row">
    
    <div class="header-text">
      <h2>Fee Heads Management</h2>
      <p class="text-muted mb-0">Manage fee types and frequencies</p>
    </div>
    
    <div> <button mat-raised-button color="primary" routerLink="/fees/head/add">
        <mat-icon>add</mat-icon> Create New Fee Head
      </button>
    </div>

  </div>

  <mat-card class="elevation-z2" style="border-radius: 8px;">
    
    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" class="w-100">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <ng-container matColumnDef="headName">
          <th mat-header-cell *matHeaderCellDef> Fee Name </th>
          <td mat-cell *matCellDef="let element"> <strong>{{element.headName}}</strong> </td>
        </ng-container>

        <ng-container matColumnDef="frequency">
          <th mat-header-cell *matHeaderCellDef> Frequency </th>
          <td mat-cell *matCellDef="let element"> 
            <span class="badge bg-light text-dark border">{{element.frequency}}</span> 
          </td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef> Description </th>
          <td mat-cell *matCellDef="let element"> {{element.description || '-'}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="primary" [routerLink]="['/fees/head/edit', element.id]">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell text-center p-4" colspan="5">
            No fee heads found. Click "Create New" to add one.
          </td>
        </tr>
      </table>
    </div>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                   showFirstLastButtons
                   aria-label="Select page of fee heads">
    </mat-paginator>

  </mat-card>
</div>
