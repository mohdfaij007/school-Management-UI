<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>Head-wise Collection Summary</h2>
    <button mat-stroked-button (click)="printReport()">
      <mat-icon>print</mat-icon> Print
    </button>
  </div>

  <mat-card style="padding: 20px; margin-top: 10px;">
    
    <div class="chart-container" *ngIf="reportData.length > 0" style="position: relative; height: 300px; width: 100%; display: flex; justify-content: center;">
      <div style="width: 500px;"> <canvas baseChart
          [data]="pieChartData"
          [type]="pieChartType"
          [options]="pieChartOptions">
        </canvas>
      </div>
    </div>
    <div *ngIf="reportData.length === 0" style="text-align: center; padding: 20px; color: #888;">
      No data available for chart.
    </div>
    
    <br>
    
    <table mat-table [dataSource]="reportData" class="mat-elevation-z0" style="width: 100%;">
      <ng-container matColumnDef="head">
        <th mat-header-cell *matHeaderCellDef> Fee Head </th>
        <td mat-cell *matCellDef="let element"> {{ element.feeHeadName }} </td>
        <td mat-footer-cell *matFooterCellDef> <strong>Grand Total</strong> </td>
      </ng-container>

      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef> Total Collected </th>
        <td mat-cell *matCellDef="let element"> <b>₹{{ element.totalAmount }}</b> </td>
        <td mat-footer-cell *matFooterCellDef> <strong>₹{{ totalCollection }}</strong> </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr mat-footer-row *matFooterRowDef="displayedColumns" style="background: #e3f2fd;"></tr>
    </table>

  </mat-card>
</div>
