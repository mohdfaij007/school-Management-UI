<div class="page-container">
  <header class="page-header">
    <div class="breadcrumb">Dashboard &gt; Students &gt; <span class="active">{{ isEditMode ? 'Edit' : 'Add New' }}</span></div>
    <h1>{{ isEditMode ? 'Edit Student' : 'New Student Admission'}}</h1>
  </header>

  <form [formGroup]="studentForm" (ngSubmit)="saveStudent()">

    <section class="card">
      <div class="card-header"><h3>Academic Details</h3></div>
      <div class="card-body grid-2-col">
        <div class="form-group">
          <label>Academic Session <span class="required">*</span></label>
          <select class="form-control" formControlName="academicSessionId">
            <option value="" disabled>Select Session</option>
            <option *ngFor="let ses of sessions" [value]="ses.id">{{ ses.sessionName }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Admission Number <span class="required">*</span></label>
          <input type="text" class="form-control" formControlName="admissionNumber" placeholder="e.g. A-2025-001">
        </div>
        <div class="form-group">
          <label>Class <span class="required">*</span></label>
          <select class="form-control" formControlName="standardId">
            <option value="" disabled>Select Class</option>
            <option *ngFor="let std of standards" [value]="std.id">{{ std.gradeName }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Section <span class="required">*</span></label>
          <select class="form-control" formControlName="sectionId">
            <option value="" disabled>Select Section</option>
            <option *ngFor="let sec of sections" [value]="sec.id">{{ sec.sectionName }}</option>
          </select>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-header"><h3>Personal Details</h3></div>
      <div class="card-body grid-2-col">
        <div class="form-group">
          <label>First Name <span class="required">*</span></label>
          <input type="text" class="form-control" formControlName="firstName">
        </div>
        <div class="form-group">
          <label>Last Name <span class="required">*</span></label>
          <input type="text" class="form-control" formControlName="lastName">
        </div>
        <div class="form-group">
          <label>Date of Birth <span class="required">*</span></label>
          <input type="date" class="form-control" formControlName="dateOfBirth">
        </div>
        <div class="form-group">
          <label>Contact Phone</label>
          <input type="tel" class="form-control" formControlName="contactPhone" placeholder="10-digit mobile number">
        </div>
        <div class="form-group">
          <label>Nationality</label>
          <input type="text" class="form-control" formControlName="nationality" placeholder="e.g. Indian">
        </div>
        <div class="form-group">
          <label>Aadhar Number</label>
          <input type="text" class="form-control" formControlName="aadharNumber">
        </div>
      </div>
    </section>

    <section class="card">
       <div class="card-header"><h3>Parents Details</h3></div>
      <div class="card-body grid-2-col">
        <div class="form-group">
          <label>Father's Name <span class="required">*</span></label>
          <input type="text" class="form-control" formControlName="fatherName">
        </div>
        <div class="form-group">
          <label>Mother's Name <span class="required">*</span></label>
          <input type="text" class="form-control" formControlName="motherName">
        </div>
        <div class="form-group">
          <label>Father's Occupation</label>
          <input type="text" class="form-control" formControlName="fatherOccupation">
        </div>
        <div class="form-group">
          <label>Mother's Occupation</label>
          <input type="text" class="form-control" formControlName="motherOccupation">
        </div>
        <div class="form-group">
          <label>Primary Mobile No. <span class="required">*</span></label>
          <input type="text" class="form-control" formControlName="primaryMobile">
        </div>
        <div class="form-group">
          <label>Secondary Mobile No.</label>
          <input type="text" class="form-control" formControlName="secondaryMobile">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" formControlName="email">
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-header"><h3>Communication Address</h3></div>
      <div class="card-body grid-2-col">
        <div class="form-group" style="grid-column: span 2;">
          <label>Current Address <span class="required">*</span></label>
          <textarea class="form-control" formControlName="currentAddress" rows="3"></textarea>
        </div>

        <div class="form-group">
          <label>City <span class="required">*</span></label>
          <input type="text" class="form-control" formControlName="city">
        </div>
        <div class="form-group">
          <label>State <span class="required">*</span></label>
          <input type="text" class="form-control" formControlName="state">
        </div>
        <div class="form-group">
          <label>Pin Code <span class="required">*</span></label>
          <input type="text" class="form-control" formControlName="pinCode">
        </div>

        <div class="form-group checkbox-group" style="grid-column: span 2; margin-top: 10px;">
          <input type="checkbox" id="sameAddress" formControlName="isAddressSame">
          <label for="sameAddress" style="display:inline; margin-left: 8px;">
            Permanent Address is same as Current Address
          </label>
        </div>

        <div class="form-group" style="grid-column: span 2;">
          <label>Permanent Address</label>
          <textarea class="form-control" formControlName="permanentAddress" rows="3"></textarea>
        </div>
      </div>
    </section>
    
    <section class="card">
      <div class="card-header"><h3>Previous Schooling</h3></div>
         <div class="card-body grid-2-col">
        <div class="form-group">
          <label>Previous School Name</label>
          <input type="text" class="form-control" formControlName="prevSchoolName">
        </div>
        <div class="form-group">
          <label>Last Class Passed</label>
          <input type="text" class="form-control" formControlName="lastClassPassed">
        </div>
        <div class="form-group">
          <label>Percentage/Grade</label>
          <input type="text" class="form-control" formControlName="prevGrade">
        </div>
         <div class="form-group">
          <label>TC No</label>
          <input type="text" class="form-control" formControlName="tcNumber">
        </div>
    </div>
    </section>

    <section class="card">
      <div class="card-header"><h3>Documents Uploads</h3></div>

        <div class="form-group photo-upload-section" style="grid-column: span 2; display: flex; gap: 20px; align-items: center;">
  
  <div class="preview-circle" style="width: 100px; height: 100px; border-radius: 50%; background: #eee; overflow: hidden; border: 2px solid #ccc;">
    <img [src]="imagePreview || 'assets/placeholder-user.png'" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
  </div>

  <div class="upload-controls">
    <label>Student Photo</label>
    <input type="file" (change)="onFileSelected($event)" accept="image/*" class="form-control">
    <small class="text-muted">Max size: 2MB. JPG/PNG only.</small>
  </div>

</div>

    </section>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" routerLink="/search-student">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="studentForm.invalid">
        {{ isEditMode ? 'Update Student' : 'Submit Admission' }}
      </button>
    </div>

  </form>
</div>
