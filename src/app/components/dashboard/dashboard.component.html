  <div class="content">
    
    <div class="header-actions" style="display: flex; justify-content: space-between; align-items: center;">
  <h3>Student List</h3>
  <a routerLink="/add-student" class="btn-add" style="background-color: #28a745; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px;">+ Add Student</a>
</div>
    <!-- Student Table -->
    <table class="student-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Admission No</th>
          <th>Grade</th>
          <th>Contact</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let student of students">
          <td>{{ student.id }}</td>
          <td>{{ student.firstName }} {{ student.lastName }}</td>
          <td>{{ student.admissionNumber }}</td>
          <td>{{ student.grade }}</td>
          <td>{{ student.contactPhone }}</td>
        </tr>
        
        <!-- Show message if no students found -->
        <tr *ngIf="students.length === 0">
          <td colspan="5" style="text-align: center;">No students found in database.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
